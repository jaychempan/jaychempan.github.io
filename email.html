<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Page</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            background: url('background-image.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* 隐藏页面外部的滚动条 */
        }

        .container {
            background-color:#f0f0f0;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: slide 20s linear infinite;
            max-height: 80vh; /* 设置最大高度，限制滚动范围 */
            overflow: auto; /* 添加容器内部的滚动条 */
        }

        @keyframes slide {
            0% {
                transform: translateY(0);
            }
            25% {
                transform: translateY(-25%);
            }
            50% {
                transform: translateY(-50%);
            }
            75% {
                transform: translateY(-75%);
            }
            100% {
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
            margin: 10px 0;
        }

        a {
            color: #007bff;
            text-decoration: none;
        }

        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
    <script>
        function copyEmail() {
            var email = "jiancheng.pan.plus@gmail.com";
            var textarea = document.createElement("textarea");
            textarea.value = email;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            alert("Email address copied to clipboard!");
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Contact Me</h1>
        <p>If you have any questions or need assistance, please feel free to contact me via email:</p>
        <p>Email: <a href="mailto:jiancheng.pan.plus@gmail.com">jiancheng.pan.plus@gmail.com</a></p>
        <button onclick="copyEmail()">Copy email address</button>
    </div>
</body>
</html>
