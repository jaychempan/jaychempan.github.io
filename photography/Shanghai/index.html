    <script type="text/javascript">
        $(document).ready(function() {
            setTimeout('move_up()', 1);
            path = '../'    
            var pages = window.location.href.split('/');
            var thisProject = pages[pages.length - 2];
            var thesePhotos = 0;
            console.log("Opening " + thisProject);

            // Add projects
            for (var project of photos.projects) {
                var item = '<li><a href="../';
                item += project.name + '/index.html';
                item += '" onclick="do_click();">';
                titleWords = project.name.split('-');
                for (var titleWord of titleWords) {
                    item += titleWord.charAt(0).toUpperCase() + titleWord.slice(1);
                    item += ' '; 
                }
                item = item.trim();
                item += '</a></li>';

                if (project.name == thisProject) {
                    thesePhotos = project.photos;
                }

                $("#projects").append(item);
            }

            // Add photos
            for (var i = 1; i <= thesePhotos; i++) {
                var item = '<a href="../' + thisProject + '/large/' + i + '.JPG" title="" class="thickbox" rel="gallery-plants">';
                item +=    '<img src="../' + thisProject + '/' + i + '.jpeg" class="thumbnail" alt=""></a>';
                $("#photos").append(item);
            }

            // Mark the active link
            $("[href]").each(function() {
                if (this.href == window.location.href) {
                    $(this).addClass("active");
                }
            });
        });
    </script>
